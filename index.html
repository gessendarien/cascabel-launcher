<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cascabel Launcher — Minimalist Game Launcher</title>
    <meta name="description" content="A minimalist, cross-platform game launcher for Windows and Linux." />
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* Clean app screenshot display */
        .app-showcase {
            width: 100%;
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        
        .app-showcase:hover {
            transform: translateY(-5px);
        }

        .app-showcase img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <!-- LANGUAGE SELECTOR (Old Style) -->
    <div class="fixed top-4 right-4 sm:right-12 z-50">
        <div class="flex items-center gap-1 bg-white/80 backdrop-blur border border-black/10 shadow-md rounded-full p-1">
            <button onclick="setLanguage('en')" id="lang-btn-en" class="px-4 py-1.5 rounded-full text-sm font-semibold transition-all bg-slate-900 text-white">
                English
            </button>
            <button onclick="setLanguage('es')" id="lang-btn-es" class="px-4 py-1.5 rounded-full text-sm font-semibold transition-all text-slate-600 hover:text-slate-900">
                Español
            </button>
        </div>
    </div>

    <!-- Minimalist Navbar -->
    <header class="w-full px-6 py-5 flex items-center justify-between sticky top-0 bg-white/80 backdrop-blur-md z-40 border-b border-slate-100/50">
        <div class="flex items-center gap-3">
            <img src="assets/cascabel.png" alt="Logo" class="w-8 h-8 object-contain">
            <span class="font-bold text-xl tracking-tight text-slate-800">Cascabel</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center pt-16 pb-24 px-4 relative z-10">
        
        <!-- Dog Logo (Bigger, no background box) -->
        <div class="mb-8 flex items-center justify-center">
            <img src="assets/cascabel.png" alt="Cascabel" class="w-36 h-36 sm:w-48 sm:h-48 object-contain drop-shadow-xl hover:scale-105 transition-transform duration-300">
        </div>

        <!-- Hero Text -->
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-center max-w-4xl leading-tight mb-6 text-slate-900" id="hero-title">
            Games meet their <br/> most beautiful launcher.
        </h1>
        <p class="text-lg md:text-xl text-slate-500 text-center max-w-2xl font-medium" id="hero-sub">
            Manage multiple emulators with customizable themes, cover art, and a minimalist interface. Available for Linux.
        </p>

        <!-- The single big image showcase -->
        <div class="app-showcase">
            <img src="screenshot.png" alt="Cascabel App Interface">
        </div>

        <!-- Download Section (Below the photo) -->
        <div class="flex flex-col items-center justify-center gap-3 mt-8 w-full max-w-sm sm:max-w-none mx-auto">
            <a href="https://github.com/gessendarien/cascabel-launcher/releases/latest"
                class="flex w-full sm:w-64 items-center justify-center gap-3 h-14 rounded-full bg-slate-900 text-white font-semibold text-base hover:bg-slate-800 hover:scale-[1.02] transition-all duration-300 shadow-xl active:scale-95 group">
                <span class="material-symbols-outlined text-[22px] transition-colors">package_2</span>
                <span id="btn-dl">Download Linux</span>
            </a>
            
            <div class="mt-4 flex justify-center">
                <a href="https://github.com/gessendarien/cascabel-launcher#installation"
                    class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 text-sm font-medium transition-colors">
                    <span class="material-symbols-outlined text-[18px]">terminal</span>
                    <span id="btn-win">Windows option</span>
                </a>
            </div>
        </div>

    </main>

    <!-- Footer Area -->
    <footer class="w-full py-8 text-center text-slate-400 text-sm bg-white border-t border-slate-100">
        <p id="footer-text">Open Source • Licensed under GPL v3.0 • <a href="https://github.com/gessendarien/cascabel-launcher" class="hover:text-slate-800 font-medium transition">GitHub</a></p>
    </footer>

    <!-- i18n Script -->
    <script>
        let currentLang = localStorage.getItem('cascabel-lang') || 'en';
        
        const texts = {
            en: {
                title: "Games meet their <br/> most beautiful launcher.",
                sub: "Manage multiple emulators with customizable themes, cover art, and a minimalist interface. Available for Linux.",
                dl: "Download Linux",
                win: "Windows option",
                footer: "Open Source • Licensed under GPL v3.0 • <a href='https://github.com/gessendarien/cascabel-launcher' class='hover:text-slate-800 font-medium transition'>GitHub</a>"
            },
            es: {
                title: "Tus juegos en el launcher <br/> más hermoso.",
                sub: "Gestiona múltiples emuladores con temas personalizables, carátulas y una interfaz minimalista. Disponible para Linux.",
                dl: "Descargar para Linux",
                win: "Opción para Windows",
                footer: "Código Abierto • Licencia GPL v3.0 • <a href='https://github.com/gessendarien/cascabel-launcher' class='hover:text-slate-800 font-medium transition'>GitHub</a>"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('cascabel-lang', lang);
            
            // Update texts
            document.getElementById('hero-title').innerHTML = texts[lang].title;
            document.getElementById('hero-sub').innerHTML = texts[lang].sub;
            document.getElementById('btn-dl').innerText = texts[lang].dl;
            document.getElementById('btn-win').innerText = texts[lang].win;
            document.getElementById('footer-text').innerHTML = texts[lang].footer;
            document.documentElement.lang = lang;

            // Update language buttons styles
            const btnEn = document.getElementById('lang-btn-en');
            const btnEs = document.getElementById('lang-btn-es');
            
            if (lang === 'en') {
                btnEn.className = 'px-4 py-1.5 rounded-full text-sm font-semibold transition-all bg-slate-900 text-white';
                btnEs.className = 'px-4 py-1.5 rounded-full text-sm font-semibold transition-all text-slate-600 hover:text-slate-900';
            } else {
                btnEs.className = 'px-4 py-1.5 rounded-full text-sm font-semibold transition-all bg-slate-900 text-white';
                btnEn.className = 'px-4 py-1.5 rounded-full text-sm font-semibold transition-all text-slate-600 hover:text-slate-900';
            }
        }

        // Initialize language
        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(currentLang);
        });
    </script>
</body>
</html>
