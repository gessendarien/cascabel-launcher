  <!-- Front ridges/DVD drive -->
  <rect x="6" y="19" width="12" height="2" rx="0.5" fill="none" stroke="white" stroke-width="1"/>
  <!-- Controller ports (4 distinct small ports) -->
  <circle cx="5" cy="19.5" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="7" cy="19.5" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="17" cy="19.5" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="19" cy="19.5" r="0.5" fill="white" opacity="0.6"/>
