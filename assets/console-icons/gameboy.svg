<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- Game Boy: Console/Handheld (White) -->
  <rect x="4" y="1" width="16" height="22" rx="2" stroke="white" stroke-width="1.5" fill="white" opacity="0.1"/>
  <!-- Screen bezel -->
  <rect x="6" y="3" width="12" height="8.5" rx="1" stroke="white" stroke-width="1" fill="white" opacity="0.08"/>
  <!-- Screen inner -->
  <rect x="7" y="4" width="10" height="6.5" rx="0.5" fill="white" opacity="0.12"/>
  <!-- D-pad -->
  <rect x="6.5" y="14.5" width="3.5" height="1.2" rx="0.2" fill="white"/>
  <rect x="7.6" y="13.3" width="1.2" height="3.6" rx="0.2" fill="white"/>
  <!-- A & B buttons -->
  <circle cx="16.5" cy="14" r="1.3" fill="white"/>
  <circle cx="14" cy="15.5" r="1.3" fill="white"/>
  <!-- Select / Start -->
  <rect x="9" y="19" width="2.5" height="0.8" rx="0.4" fill="white" opacity="0.5" transform="rotate(-25 10.25 19.4)"/>
  <rect x="12" y="19" width="2.5" height="0.8" rx="0.4" fill="white" opacity="0.5" transform="rotate(-25 13.25 19.4)"/>
</svg>
