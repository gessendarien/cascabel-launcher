<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- Wii U Console (The console unit itself, long box with rounded corners) -->
  <rect x="2" y="7" width="20" height="10" rx="3" stroke="white" stroke-width="1.5" fill="white" opacity="0.1"/>
  <!-- Front face separation -->
  <path d="M2 12c0 2.5 1 3 3 3h14c2 0 3-.5 3-3" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Disc Slot -->
  <line x1="4" y1="10" x2="15" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Power Button -->
  <circle cx="18" cy="10" r="1" fill="white" opacity="0.7"/>
  <!-- Sync / Eject Buttons -->
  <circle cx="18" cy="14" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="16" cy="14" r="0.5" fill="white" opacity="0.5"/>
</svg>
