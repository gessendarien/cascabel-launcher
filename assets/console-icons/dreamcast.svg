<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- Dreamcast Console (White) -->
  <rect x="4" y="4" width="16" height="16" rx="3" stroke="white" stroke-width="1.5" fill="white" opacity="0.1"/>
  <!-- Large central disc lid -->
  <circle cx="12" cy="11.5" r="5" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- Triangle indicator LED -->
  <polygon points="12,17 11,18.5 13,18.5" fill="white" opacity="0.8"/>
  <!-- Power button -->
  <circle cx="6" cy="15" r="1" fill="white" opacity="0.6"/>
  <!-- Open button -->
  <circle cx="18" cy="15" r="1" fill="white" opacity="0.6"/>
  <!-- Controller ports (4 dots at front) -->
  <circle cx="8" cy="20" r="0.5" fill="white"/>
  <circle cx="10.5" cy="20" r="0.5" fill="white"/>
  <circle cx="13.5" cy="20" r="0.5" fill="white"/>
  <circle cx="16" cy="20" r="0.5" fill="white"/>
</svg>
