<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- PlayStation 2 Console (Black monolith with lines) - Made White for UI -->
  <rect x="4" y="2" width="16" height="20" rx="1" stroke="white" stroke-width="1.5" fill="white" opacity="0.1"/>
  <!-- Ribbed front design -->
  <line x1="6" y1="4" x2="18" y2="4" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="6" y1="6" x2="18" y2="6" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="6" y1="8" x2="18" y2="8" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <!-- PS Logo (small cross) -->
  <path d="M11.5 11v2h1v-2h-1zM11 11.5v1h2v-1h-2z" fill="white"/>
  <!-- Disc tray outline -->
  <rect x="6" y="14" width="12" height="1.5" rx="0.3" fill="white" opacity="0.4"/>
  <!-- Buttons -->
  <circle cx="17" cy="18" r="0.7" fill="white"/>
  <circle cx="15" cy="18" r="0.7" fill="white" opacity="0.6"/>
</svg>
