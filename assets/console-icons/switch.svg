<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- Switch Console (Dock with tablet inserted) -->
  <!-- Dock -->
  <rect x="4" y="10" width="16" height="10" rx="1.5" stroke="white" stroke-width="1.5" fill="white" opacity="0.1"/>
  <rect x="4" y="12" width="16" height="8" rx="1.5" fill="white" opacity="0.05"/>
  <!-- Joycons sticking out of dock -->
  <rect x="5.5" y="4" width="2.5" height="8" rx="1" stroke="white" stroke-width="1.2" fill="white" opacity="0.3"/>
  <rect x="16" y="4" width="2.5" height="8" rx="1" stroke="white" stroke-width="1.2" fill="white" opacity="0.3"/>
  <!-- Tablet screen inside dock (just the top edge) -->
  <rect x="8" y="4" width="8" height="6" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- Dock logo/indicator -->
  <circle cx="18" cy="18" r="0.6" fill="white" opacity="0.7"/>
</svg>
