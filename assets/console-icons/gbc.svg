<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- Game Boy Color Console (White) -->
  <rect x="4" y="1" width="16" height="22" rx="2.5" stroke="white" stroke-width="1.5" fill="white" opacity="0.1"/>
  <!-- Top bump -->
  <rect x="14" y="1" width="4" height="3" rx="1" fill="white" opacity="0.12"/>
  <!-- Screen bezel -->
  <rect x="6.5" y="4" width="11" height="7.5" rx="0.8" stroke="white" stroke-width="0.8" fill="white" opacity="0.08"/>
  <rect x="7.5" y="5" width="9" height="5.5" rx="0.4" fill="white" opacity="0.14"/>
  <!-- D-pad -->
  <rect x="6.5" y="14.5" width="3.5" height="1.2" rx="0.2" fill="white"/>
  <rect x="7.6" y="13.3" width="1.2" height="3.6" rx="0.2" fill="white"/>
  <!-- A & B buttons -->
  <circle cx="16.5" cy="13.5" r="1.2" fill="white"/>
  <circle cx="14.2" cy="15.2" r="1.2" fill="white"/>
  <!-- Select / Start -->
  <rect x="9" y="19.5" width="2.2" height="0.7" rx="0.35" fill="white" opacity="0.5"/>
  <rect x="12.5" y="19.5" width="2.2" height="0.7" rx="0.35" fill="white" opacity="0.5"/>
</svg>
