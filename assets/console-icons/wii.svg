<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- Wii Console (Vertical Stand) -->
  <!-- Base stand -->
  <ellipse cx="12" cy="20" rx="6" ry="2" fill="white" opacity="0.3"/>
  <!-- Main console body -->
  <path d="M9 4l5-2v16l-5 2V4z" stroke="white" stroke-width="1.5" fill="white" opacity="0.1" stroke-linejoin="round"/>
  <path d="M14 2l2.5 1v16L14 18V2z" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round" opacity="0.5"/>
  <!-- Disc Slot (Blue Glow representation) -->
  <line x1="10" y1="5" x2="10" y2="15" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Power Button -->
  <circle cx="10" cy="18" r="0.8" fill="white" opacity="0.7"/>
</svg>
