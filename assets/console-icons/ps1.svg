<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
  <!-- PlayStation 1 Console (White) -->
  <rect x="2" y="6" width="20" height="12" rx="1.5" stroke="white" stroke-width="1.5" fill="white" opacity="0.1"/>
  <!-- Central CD Lid -->
  <circle cx="12" cy="12" r="5" stroke="white" stroke-width="1.2" fill="none"/>
  <circle cx="12" cy="12" r="1.5" fill="white" opacity="0.2"/>
  <!-- Power button -->
  <circle cx="5" cy="15" r="1.2" fill="white" opacity="0.7"/>
  <!-- Open/Reset buttons -->
  <rect x="17" y="14" width="2.5" height="1" rx="0.3" fill="white" opacity="0.7"/>
  <rect x="17" y="16" width="2.5" height="1" rx="0.3" fill="white" opacity="0.7"/>
  <!-- Memory card slots -->
  <rect x="4" y="2" width="4" height="4" rx="0.5" stroke="white" stroke-width="1.2" fill="none"/>
  <rect x="16" y="2" width="4" height="4" rx="0.5" stroke="white" stroke-width="1.2" fill="none"/>
</svg>
