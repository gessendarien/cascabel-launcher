<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex items-center justify-center p-xl">
<!-- Main Modal Container -->
<div class="w-full max-w-6xl h-[800px] bg-surface flex flex-col rounded-2xl overflow-hidden shadow-2xl border border-outline-variant relative">
<!-- TopAppBar -->
<header class="bg-surface-container text-primary font-headline-sm text-headline-sm relative w-full border-b border-outline-variant flex items-center justify-between px-lg h-16 z-50 shrink-0">
<div class="flex items-center gap-md cursor-pointer active:scale-95 transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="settings">settings</span>
<span class="font-headline-sm text-headline-sm font-bold text-on-surface">Launcher Settings</span>
</div>
<div class="cursor-pointer active:scale-95 hover:bg-secondary-container transition-colors p-base rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</div>
</header>
<!-- Main Content Layout (Side-by-Side) -->
<div class="flex flex-1 min-h-0 relative">
<!-- Sidebar Navigation (NavigationDrawer) -->
<aside class="w-72 bg-surface-container-low border-r border-outline-variant flex flex-col p-md gap-xl shrink-0 overflow-y-auto">
<!-- Profile Section -->
<div class="p-md bg-surface-container-high border border-outline-variant rounded-xl flex flex-col items-center gap-sm">
<div class="relative group">
<div class="w-20 h-20 rounded-full border-2 border-primary overflow-hidden shadow-lg bg-surface-container-highest cursor-pointer">
<img alt="User Profile Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaPsOEM9-IpwAjjJFaG0xYzi8v6dr8DSNcNLfIcfd8X0KdgacvDauT3dpBiqZZENd9Y9QBH3ao1cSTPxUx_JKyBNYqP5NQIQEDtteShzQty0Pk7N0qh0D-ExlzoRUqNBWnLuOlJvCnpxvGfpuAMFgFj9o0QRR_lyRhUDJbNeKUE59uoFi0HwlIWUe5urX03aiJ5ub2If0OR3zmZlquWo8xc7M1eIeFdhRamtwiQ59U1Y2TlU_EkucwvzlLAXMUfZWnJ7dtlJJhdBI"/>
</div>
</div>
<div class="text-center">
<p class="font-label-md text-label-md text-on-surface-variant">Online • v2.4.0</p>
</div>
<button class="w-full bg-surface-container-highest border border-outline-variant text-on-surface px-sm py-xs rounded-lg font-label-md text-label-md hover:brightness-110 transition-all active:scale-95 flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="photo_camera">photo_camera</span>
                        Change Photo
                    </button>
</div>
<!-- Navigation Links -->
<nav class="flex flex-col gap-xs">
<div class="bg-primary text-on-primary px-md py-sm rounded-lg font-bold font-label-md text-label-md flex items-center gap-md cursor-pointer">
<span class="material-symbols-outlined" data-icon="desktop_windows">desktop_windows</span>
                        Interface
                    </div>
<div class="text-secondary hover:bg-secondary-container/50 px-md py-sm rounded-lg font-label-md text-label-md flex items-center gap-md transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="system_update">system_update</span>
                        Updates
                    </div>
<div class="text-secondary hover:bg-secondary-container/50 px-md py-sm rounded-lg font-label-md text-label-md flex items-center gap-md transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="info">info</span>
                        About
                    </div>
</nav>
</aside>
<!-- Main Panel (Theme Configuration) -->
<main class="flex-1 overflow-y-auto p-xl flex flex-col">
<div class="max-w-4xl mx-auto w-full flex flex-col h-full">
<section class="flex flex-col gap-lg">
<div class="flex items-center justify-between border-b border-outline-variant pb-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="palette">palette</span>
<h3 class="font-headline-lg text-headline-lg text-on-surface">Theme Configuration</h3>
</div>
<span class="font-label-md text-label-md text-primary uppercase tracking-widest">Interface</span>
</div>
<!-- Configuration Controls -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Header Color Card -->
<div class="p-lg bg-surface-container-high border border-outline-variant rounded-xl flex items-center justify-between hover:bg-surface-container-highest transition-colors cursor-pointer group">
<div class="flex items-center gap-md">
<div class="p-base bg-surface-container-lowest rounded-lg border border-outline-variant group-hover:border-primary transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="format_paint">format_paint</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface">Header Color</p>
<p class="font-label-md text-label-md text-on-surface-variant">Top navigation accent</p>
</div>
</div>
<div class="flex items-center gap-sm">
<span class="font-label-md text-label-md font-mono text-on-surface-variant">#FF0000</span>
<div class="w-10 h-10 rounded-lg border border-outline shadow-inner" style="background-color: #FF0000;"></div>
</div>
</div>
<!-- Active Tab Color Card -->
<div class="p-lg bg-surface-container-high border border-outline-variant rounded-xl flex items-center justify-between hover:bg-surface-container-highest transition-colors cursor-pointer group">
<div class="flex items-center gap-md">
<div class="p-base bg-surface-container-lowest rounded-lg border border-outline-variant group-hover:border-primary transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="tab">tab</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface">Active Tab Color</p>
<p class="font-label-md text-label-md text-on-surface-variant">Selection highlights</p>
</div>
</div>
<div class="flex items-center gap-sm">
<span class="font-label-md text-label-md font-mono text-on-surface-variant">#333333</span>
<div class="w-10 h-10 rounded-lg border border-outline shadow-inner" style="background-color: #333333;"></div>
</div>
</div>
</div>
</section>
<!-- Sticky/Bottom Action Buttons -->
<div class="flex justify-end gap-md border-t border-outline-variant pt-lg mt-auto">
<button class="px-xl py-md bg-transparent border border-outline-variant text-on-surface-variant rounded-lg font-headline-sm text-headline-sm hover:bg-surface-container-highest hover:text-on-surface transition-all active:scale-95">
                            Discard Changes
                        </button>
<button class="px-xl py-md bg-[#3b82f6] text-[#ffffff] rounded-lg font-headline-sm text-headline-sm shadow-lg shadow-primary/20 hover:brightness-110 transition-all active:scale-95">
                            Save Changes
                        </button>
</div>
</div>
</main>
</div>
</div>

            });
        });

</body></html>
